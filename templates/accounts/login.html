{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — FacturaSUNAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-card fade-in-up">
    <div class="text-center mb-4">
      <div class="login-icon"><i class="bi bi-receipt-cutoff"></i></div>
      <h2>FacturaSUNAT</h2>
      <p class="login-subtitle">Sistema de Facturación Electrónica</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} py-2 px-3 rounded-3 mb-3" style="font-size:0.85rem;">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg-card);border-color:var(--border-color);color:var(--text-secondary);">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg-card);border-color:var(--border-color);color:var(--text-secondary);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
      </button>
    </form>

    <div class="text-center mt-4">
      <small style="color:var(--text-secondary);">© 2026 — Universidad Señor de Sipán</small>
    </div>
  </div>
</body>
</html>
